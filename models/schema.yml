models:
  - name: dim_listings_cleansed
    description: "A dimension table for Airbnb listings with cleansed data."
    columns:
      - name: listing_id
        description: "primary key for the listing"
        data_tests:
          - not_null
          - unique

      - name: host_id
        description: "foreign key to the hosts table"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_hosts_cleansed')
              field: host_id

      - name: room_type
        description: "type of room being offered"
        data_tests:
          - accepted_values:
              values: ['Entire home/apt', 'Private room', 'Shared room', 'Hotel room']

      - name: minimum_nights
        description: "minimum number of nights required for booking"
        data_tests:
          - positive_values
  - name: dim_hosts_cleansed
    description: "A dimension table for Airbnb hosts with cleansed data."
    columns:
      - name: host_id
        description: "primary key for the host"
        data_tests:
          - not_null
          - unique

      - name: host_name
        description: "name of the host"
        data_tests:
          - not_null

      - name: is_superhost
        description: "indicates if the host is a superhost"
        data_tests:
          - accepted_values:
              values: ['t', 'f']
  - name: fct_reviews
    description: "A fact table for Airbnb reviews."
    columns:
      - name: listing_id
        description: "foreign key to the listings table"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_listings_cleansed')
              field: listing_id

      - name: reviewer_name
        description: "name of the reviewer"
        data_tests:
          - not_null

      - name: review_sentiment
        description: "sentiment of the review"
        data_tests:
          - accepted_values:
              values: ['positive', 'negative', 'neutral']